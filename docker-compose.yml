version: "3"

services:
  apache:
    container_name: "trade-apache"
    restart: always
    build:
      context: docker-files/trade-apache
    ports:
      - "80:80"
    volumes:
      - ./www:/var/www
      - ./logs/apache2:/var/log/apache2:delegated
    depends_on:
      - php8.4
    develop:
      watch:
        - action: rebuild
          path: docker-files/trade-apache/config/panel.conf
        - action: rebuild
          path: docker-files/trade-apache/config/panel-ssl.conf

        - action: rebuild
          path: docker-files/trade-apache/Dockerfile
  db:
    image: mariadb:12.1.2
    container_name: "trade-db"
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: password
    volumes:
      - "./data/mysql:/var/lib/mysql"
  php8.4:
    container_name: "trade-php"
    restart: always
    build:
      context: docker-files/trade-php8.4
    volumes:
      - "./logs/supervisor/:/var/log/supervisor/:delegated"
      - "./www:/var/www"
    develop:
      watch:
        - action: rebuild
          path: docker-files/trade-php8.4/config/supervisord.conf

        - action: rebuild
          path: docker-files/trade-php8.4/Dockerfile
    depends_on:
      - db
    environment:
      APP_KEY: "base64:hGHIdRQ8R0pQjq1QuBDU20JpCF/btcfXr+e1Z7NLgL4="
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_DATABASE: trade
      DB_USERNAME: root
      DB_PASSWORD: password