<IfModule mod_ssl.c>
	<VirtualHost _default_:443>
	    ServerName {{projectCommand}}.tenorium.local

	    LogLevel warn proxy_fcgi:error

		ServerAdmin webmaster@localhost
		DocumentRoot /var/www/sample/public

		ErrorLog ${APACHE_LOG_DIR}/error.log
		CustomLog ${APACHE_LOG_DIR}/access.log combined

		SSLEngine on

		SSLCertificateFile	/etc/apache2/ssl/{{projectCommand}}.tenorium.local.pem
		SSLCertificateKeyFile /etc/apache2/ssl/{{projectCommand}}.tenorium.local-key.pem

		DirectoryIndex index.php index.htm index.html

        <Directory /var/www/sample>
            Options -Indexes +IncludesNOEXEC +SymLinksIfOwnerMatch
            Require all granted

            AllowOverride All
        </Directory>

        ProxyPass /.well-known !

        <LocationMatch "^/\.well-known/">
            RewriteEngine Off
        </LocationMatch>

        <FilesMatch \.php$>
            SetHandler "proxy:fcgi://php8.4:9000"
        </FilesMatch>
	</VirtualHost>
</IfModule>

